<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="shortcut icon" href="./images/black lo.png" type="image/x-icon">
</head>
<body>

  <div class="topLeft">
    <div class="logo">
      <div class="image">
        <img src="./images/black lo.png" alt="Botwe logo">
      </div>
    </div>
    <span class="badge">Mfantsipim</span>
    <span class="badge">SRC</span>
    <span class="badge">Voting</span>
    <span class="badge dashboardBadge">Dashboard</span>
  </div>

  <main class="dashboard">

    <section class="summaryGrid" id="summaryGrid">
  <div class="summaryCard totalCard">
    <span class="cardLabel">Total Amount Made</span>
    <h2 id="totalAmount">GH₵ 0.00</h2>
    <p>Updated from all submitted votes</p>
  </div>
</section>

    <section class="tableSection">
      <div class="sectionTop">
        <div>
          <h2>Nominees by Category</h2>
          <p>View nominees, votes, and amount generated per category.</p>
        </div>

        <div class="filterBox">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter" name="categoryFilter">
          </select>
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nominee</th>
              <th>Category</th>
              <th>Votes</th>
              <th>Amount Made</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="nomineeTableBody">
            <tr>

          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="dashboard.js"></script>
  <script>
async function enforceVotingEndedScreen() {
  try {
    const res = await fetch("/api/voting-status");
    const data = await res.json();

    if (data.ended) {
      document.body.innerHTML = `
        <div style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0b0b0f;
          color: white;
          font-family: Arial, sans-serif;
          text-align: center;
          padding: 20px;
        ">
          <h1 style="
            font-size: clamp(2rem, 5vw, 4rem);
            color: #ff4d4f;
            margin: 0;
          ">
            Voting has ended
          </h1>
        </div>
      `;
    }
  } catch (err) {
    console.error("Voting status check failed:", err);
  }
}

enforceVotingEndedScreen();
</script>
</body>
</html>
